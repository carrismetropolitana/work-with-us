# # #

name: tmlmobilidade-test

services:
  appdb:
    container_name: appdb_dev
    image: mongo
    deploy:
      restart_policy:
        condition: any
        delay: 30s
    logging:
      options:
        max-size: '1m'
        max-file: '1'
    ports:
      - 37001:27017
    environment:
      - MONGO_INITDB_DATABASE=production
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
  appfrontend:
    container_name: appfrontend_dev
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev
      target: dev
    ports:
      - "49025:49025"
    volumes:
      - ../apps:/app/apps
      - ../package.json:/app/package.json
      - ../turbo.json:/app/turbo.json
    environment:
      - CHOKIDAR_USEPOLLING=true
  